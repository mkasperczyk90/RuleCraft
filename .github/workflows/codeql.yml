name: CodeQL

# Warranted here rather than habitual: this library compiles and executes generated code and
# ships its own security analyzer. A second opinion on the gate is worth having.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly published queries reach the code without waiting for a commit.
    - cron: '21 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          # Traced build (not buildless): this library's whole point is the code it compiles and
          # runs, so CodeQL sees more with a real build's dataflow than by reading sources alone.
          build-mode: manual

      # Both inputs on purpose, same as ci.yml: setup-dotnet installs each, global.json picks the SDK.
      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x
          global-json-file: global.json

      - name: Build
        run: dotnet build RuleCraft.slnx --configuration Release

      - name: Analyze
        uses: github/codeql-action/analyze@v4

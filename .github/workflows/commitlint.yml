name: Commit lint

# Every commit in a PR to main must be a Conventional Commit, because Release Please reads those
# messages to compute the next version and the changelog. Enforced in CI (not just a local hook) so
# it holds regardless of a contributor's toolchain and cannot be skipped with --no-verify.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the action can see every commit in the PR range, not just the tip.
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

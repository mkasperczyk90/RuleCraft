name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      # Never cancel one leg because the other failed. The matrix exists to answer "is this
      # platform-specific?", and fail-fast would throw away exactly that answer.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      # Both inputs on purpose: setup-dotnet installs each, and global.json still decides which
      # SDK builds. The 8.0 entry is not redundant — SDK 10 carries no .NET 8 runtime, so without
      # it the net8.0 test leg dies with "framework not found" before running a single test.
      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x
          global-json-file: global.json

      # Locked mode: fail if the resolved graph differs from the committed packages.lock.json, so a
      # dependency cannot change between a green PR and the merge without the lockfile changing too.
      - name: Restore
        run: dotnet restore RuleCraft.slnx --locked-mode

      # The whole solution, so a break in the sample is a build failure and not a surprise later.
      - name: Build
        run: dotnet build RuleCraft.slnx --configuration Release --no-restore

      # ubuntu-latest is not box-ticking: this suite has only ever run on Windows, and the store
      # is full of Path, File.Move(overwrite) and case-sensitivity assumptions that Linux tests
      # for the first time here.
      # coverlet.collector is already a dependency of the test project; "XPlat Code Coverage"
      # turns it on. Output is a Cobertura file under TestResults/ — collected, not yet uploaded
      # to a coverage service, which would need an account and a token.
      - name: Test
        run: >
          dotnet test tests/RuleCraft.Tests/RuleCraft.Tests.csproj
          --configuration Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
